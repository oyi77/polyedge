services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "backend.core.orchestrator"]
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: polyedge
      POSTGRES_PASSWORD: polyedge
      POSTGRES_DB: polyedge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data:
